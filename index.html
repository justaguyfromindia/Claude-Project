<script>
const ROLES_DEF=['Manager','Assistant Manager','Floor Staff','Kitchen Porter','Bar Staff','Receptionist'];
const DAYS=['Thu','Fri','Sat','Sun','Mon','Tue','Wed'];
const SEN={Manager:1,'Assistant Manager':2,'Floor Staff':3,'Kitchen Porter':4,'Bar Staff':5,Receptionist:6};
const PIN='1234';

let VIEW='landing',EMP_ID=null,WK_OFF=0,MGR_TAB='prefs',RES_DAY=0;
let SHOW_REQ=false,SHOW_DL=false,ADD_RI=null,DSRC=null;
let ALLOC={},OVR={},CU=null;
let DEADLINE=null;
let RORD=[...ROLES_DEF];
let MINS={Manager:1,'Assistant Manager':2,'Floor Staff':4,'Kitchen Porter':2,'Bar Staff':1,Receptionist:2};

function mkP(){return Array(7).fill(null).map(()=>({type:'',s:'',e:''}));}
let STAFF=[
  {id:1,name:'Jamie Clarke',role:'Manager',emp:'FT',prefs:mkP(),sub:false},
  {id:2,name:'Priya Nair',role:'Assistant Manager',emp:'FT',prefs:mkP(),sub:false},
  {id:3,name:'Tom Walsh',role:'Floor Staff',emp:'PT',prefs:mkP(),sub:false},
];
let NID=4;

function gws(off){const d=new Date(),day=d.getDay();d.setDate(d.getDate()-(day+3)%7+off*7);d.setHours(0,0,0,0);return d;}
function fmtD(d){return d.toLocaleDateString('en-IE',{day:'numeric',month:'short'});}
function fmtDLong(d){return d.toLocaleDateString('en-IE',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
function todayC(){const t=new Date();t.setHours(0,0,0,0);const th=gws(WK_OFF);for(let i=0;i<7;i++){const d=new Date(th);d.setDate(th.getDate()+i);if(d.getTime()===t.getTime())return i;}return -1;}
function inits(n){return(n||'').split(' ').filter(Boolean).map(p=>p[0]).join('').slice(0,2).toUpperCase()||'?';}
function fmtH(h){return h===0?'—':h===Math.floor(h)?h+'h':h.toFixed(1)+'h';}
function fmt12(t){if(!t)return '';const[h,m]=t.split(':').map(Number);const ap=h<12?'am':'pm',hh=h%12||12;return m===0?`${hh}${ap}`:`${hh}:${String(m).padStart(2,'0')}${ap}`;}
function pH(p){
  if(!p||!p.type)return 0;
  if(p.type==='s')return 8.5;
  if(p.type==='c')return 9;
  if(p.type==='custom'&&p.s&&p.e){const[sh,sm]=p.s.split(':').map(Number),[eh,em]=p.e.split(':').map(Number);let m=(eh*60+em)-(sh*60+sm);if(m<=0)m+=1440;return Math.round(m*10/60)/10;}
  return 0;
}
function tH(s,src){const pr=src==='a'?(ALLOC[s.id]||s.prefs):s.prefs;return pr.reduce((sum,p)=>sum+pH(p),0);}
function sLbl(p){if(!p||!p.type)return 'Off';if(p.type==='s')return 'Starting';if(p.type==='c')return 'Closing';if(p.type==='custom'&&p.s)return fmt12(p.s)+'–'+fmt12(p.e);return 'Off';}
function sCls(p){return !p||!p.type?'':p.type==='s'?'s':p.type==='c'?'c':p.type==='custom'?'cu':'';}
function subCt(){return STAFF.filter(s=>s.sub).length;}
function allSub(){return STAFF.length>0&&STAFF.every(s=>s.sub);}
function wkHdr(){const th=gws(WK_OFF),e=new Date(th);e.setDate(th.getDate()+6);return`${fmtD(th)} – ${fmtD(e)}`;}

function isPastDL(){return DEADLINE?new Date()>new Date(DEADLINE):false;}
function dlLabel(){if(!DEADLINE)return null;return fmtDLong(new Date(DEADLINE));}
function timeUntilDL(){
  if(!DEADLINE)return null;
  const diff=new Date(DEADLINE)-new Date();
  if(diff<=0)return null;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  if(h>48)return `${Math.floor(h/24)} days remaining`;
  if(h>0)return `${h}h ${m}m remaining`;
  return `${m}m remaining`;
}
function setDL(v){DEADLINE=v||null;render();}
function clrDL(){DEADLINE=null;render();}

function setP(id,di,val){

  s.prefs[di]=val==='s'?{type:'s',s:'04:00',e:'12:30'}:val==='c'?{type:'c',s:'12:30',e:'21:30'}:{type:'',s:'',e:''};
  render();
}
function sA(id,di,val){
  const s=STAFF.find(x=>x.id===id);if(!s)return;
  if(!ALLOC[id])ALLOC[id]=s.prefs.map(p=>({...p}));
  if(val==='custom'){CU={staffId:id,dayIdx:di,isA:true,prevP:{...(ALLOC[id][di]||{type:'',s:'',e:''})}};ALLOC[id][di]={type:'custom',s:'09:00',e:'17:00'};if(!OVR[id])OVR[id]=Array(7).fill(false);OVR[id][di]=true;render();return;}
  ALLOC[id][di]=val==='s'?{type:'s',s:'04:00',e:'12:30'}:val==='c'?{type:'c',s:'12:30',e:'21:30'}:{type:'',s:'',e:''};
  if(!OVR[id])OVR[id]=Array(7).fill(false);OVR[id][di]=true;render();
}
function oCu(id,di,isA){
  const s=STAFF.find(x=>x.id===id);if(!s)return;
  const pr=isA?(ALLOC[id]||s.prefs):s.prefs;
  const p=pr[di]||{type:'',s:'',e:''};
  CU={staffId:id,dayIdx:di,isA,prevP:{...p}};

}

function updCuH(){

function calcAlloc(){
  ALLOC={};OVR={};
  STAFF.forEach(s=>{ALLOC[s.id]=s.prefs.map(p=>({...p}));});
  for(let d=0;d<7;d++){
    ROLES_DEF.forEach(r=>{
      const mn=MINS[r]||0;if(!mn)return;
      const rs=STAFF.filter(s=>s.role===r);
      const wk=rs.filter(s=>ALLOC[s.id][d]&&ALLOC[s.id][d].type);
      const nd=mn-wk.length;if(nd<=0)return;
      rs.filter(s=>!ALLOC[s.id][d]||!ALLOC[s.id][d].type).slice(0,nd).forEach(s=>{
        const wp=s.prefs.filter(p=>p&&p.type);
        const mc=wp.length>0?wp.sort((a,b)=>wp.filter(v=>v.type===b.type).length-wp.filter(v=>v.type===a.type).length)[0]:{type:'c',s:'12:30',e:'21:30'};
        ALLOC[s.id][d]={...mc};
      });
    });
    const ac=STAFF.filter(s=>ALLOC[s.id][d]&&ALLOC[s.id][d].type);
    if(ac.length<2)continue;
    const bs={s:[],c:[],custom:[]};
    ac.forEach(s=>{const t=ALLOC[s.id][d].type;if(bs[t])bs[t].push(s);});
    if(bs.s.length===0){const pool=[...bs.c,...bs.custom].filter(x=>x.role!=='Manager').sort((a,b)=>SEN[b.role]-SEN[a.role]);if(pool.length>0)ALLOC[pool[0].id][d]={type:'s',s:'04:00',e:'12:30'};}
    if(bs.c.length+bs.custom.length===0){const pool=[...bs.s].filter(x=>x.role!=='Manager').sort((a,b)=>SEN[b.role]-SEN[a.role]);if(pool.length>0)ALLOC[pool[0].id][d]={type:'c',s:'12:30',e:'21:30'};}
  }
}
function calcShow(){if(!allSub())return;calcAlloc();MGR_TAB='results';RES_DAY=0;render();}
function dayIss(d){return ROLES_DEF.some(r=>{const mn=MINS[r]||0;if(!mn)return false;return STAFF.filter(s=>s.role===r&&(ALLOC[s.id]||[])[d]&&(ALLOC[s.id]||[])[d].type).length<mn;});}

function suggMeta(){
  const fullDays=Array.from({length:7},(_,d)=>!dayIss(d)).filter(Boolean).length;
  let adj=0,filled=0;
  STAFF.forEach(s=>{(ALLOC[s.id]||[]).forEach((p,d)=>{const pr=s.prefs[d];if(p&&p.type&&pr&&pr.type&&p.type!==pr.type)adj++;if(p&&p.type&&(!pr||!pr.type))filled++;});});
  return{fullDays,adj,filled};
}

function setupDrag(){
  document.querySelectorAll('.rsec[data-ri]').forEach(sec=>{
    const h=sec.querySelector('.dhnd');
    if(h){h.addEventListener('mousedown',()=>sec.setAttribute('draggable','true'));h.addEventListener('mouseup',()=>sec.setAttribute('draggable','false'));}
    sec.addEventListener('dragstart',e=>{DSRC=parseInt(sec.dataset.ri);e.dataTransfer.effectAllowed='move';setTimeout(()=>sec.classList.add('dragging'),0);});
    sec.addEventListener('dragend',()=>{sec.classList.remove('dragging');sec.setAttribute('draggable','false');document.querySelectorAll('.rsec').forEach(s=>s.classList.remove('drag-over'));DSRC=null;});
    sec.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.rsec').forEach(s=>s.classList.remove('drag-over'));sec.classList.add('drag-over');});
    sec.addEventListener('dragleave',e=>{if(!sec.contains(e.relatedTarget))sec.classList.remove('drag-over');});
    sec.addEventListener('drop',e=>{e.preventDefault();sec.classList.remove('drag-over');const t=parseInt(sec.dataset.ri);if(DSRC!==null&&DSRC!==t){const m=RORD.splice(DSRC,1)[0];RORD.splice(t,0,m);render();}});
  });
}

function cellH(id,di,p,locked,isA){
  const cls=sCls(p);
  if(locked){return`<span class="sb ${cls||'off'}">${sLbl(p)}</span>`;}
  const fn=isA?`sA(${id},${di},this.value)`:`setP(${id},${di},this.value)`;
  const cuL=p&&p.type==='custom'&&p.s?fmt12(p.s)+'–'+fmt12(p.e):'Custom…';
  const eb=p&&p.type==='custom'?`<button class="ecu" onclick="oCu(${id},${di},${isA})" title="Edit">✎</button>`:'';
  return`<div class="sc"><select class="ss ${cls}" onchange="${fn}">
    <option value="" ${(!p||!p.type)?'selected':''}>Off</option>
    <option value="s" ${p&&p.type==='s'?'selected':''}>Starting</option>
    <option value="c" ${p&&p.type==='c'?'selected':''}>Closing</option>
    <option value="custom" ${p&&p.type==='custom'?'selected':''}>${cuL}</option>
  </select>${eb}</div>`;
}

function expXL(){
  if(typeof XLSX==='undefined'){alert('Excel library not loaded. Try again shortly.');return;}
  const th=gws(WK_OFF),e=new Date(th);e.setDate(th.getDate()+6);
  const wl=`${fmtD(th)} – ${fmtD(e)}`;
  const dhs=DAYS.map((d,i)=>{const dd=new Date(th);dd.setDate(th.getDate()+i);return`${d} ${dd.getDate()}`;});
  const rows=[[`Staff Roster — ${wl}`],[],['Name','Role','Type',...dhs,'Total Hours']];
  const ha=Object.keys(ALLOC).length>0;
  RORD.forEach(role=>{
    const rs=STAFF.filter(s=>s.role===role);if(!rs.length)return;
    rows.push([role.toUpperCase()]);
    rs.forEach(s=>{
      const src=ha?(ALLOC[s.id]||s.prefs):s.prefs;
      const hrs=src.reduce((sum,p)=>sum+pH(p),0);
      rows.push([s.name,s.role,s.emp,...src.map(p=>{if(!p||!p.type)return'Off';if(p.type==='s')return'Starting (4:00am–12:30pm)';if(p.type==='c')return'Closing (12:30pm–9:30pm)';return`Custom ${fmt12(p.s)}–${fmt12(p.e)}`;}),fmtH(hrs)]);
    });
    rows.push([]);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:20},{wch:6},...Array(7).fill({wch:26}),{wch:12}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Roster');
  XLSX.writeFile(wb,`Roster_${wl.replace(/[\s–]/g,'_')}.xlsx`);
}

function rdRes(){
  const th=gws(WK_OFF);
  const tabs=DAYS.map((dy,i)=>{const dd=new Date(th);dd.setDate(th.getDate()+i);const wi=dayIss(i);return`<button class="dtab${i===RES_DAY?' act':''}${wi?' wi':''}" onclick="RES_DAY=${i};rdRes()">${dy} ${dd.getDate()}${wi?' ⚠':''}</button>`;}).join('');
  const d=RES_DAY;
  const shCfg={s:{dot:'#EF9F27',lbl:'Starting shift',time:'4:00am–12:30pm',bg:'#FAEEDA',tx:'#633806'},c:{dot:'#378ADD',lbl:'Closing shift',time:'12:30pm–9:30pm',bg:'#E6F1FB',tx:'#0C447C'},custom:{dot:'#7F77DD',lbl:'Custom shift',time:'custom hours',bg:'#EEEDFE',tx:'#3C3489'}};
  const grps=['s','c','custom'].map(sk=>{
    const sv=shCfg[sk];
    const ins=STAFF.filter(s=>{const p=(ALLOC[s.id]||[])[d];return p&&p.type===sk;});
    const chips=ins.length===0?`<div style="font-size:11px;color:var(--color-text-tertiary,#aaa);font-style:italic;padding:2px 0">No one allocated</div>`:ins.map(s=>{
      const pr=s.prefs[d],al=(ALLOC[s.id]||[])[d];

      return`<div class="chip"><div class="chav" style="background:${sv.bg};color:${sv.tx}">${inits(s.name)}</div><div><div style="display:flex;align-items:center;gap:4px"><span style="font-size:12px;font-weight:500;color:var(--color-text-primary,#1a1a1a)">${s.name}</span><span class="ebdg ${s.emp} locked">${s.emp}</span></div><div class="chsub">${s.role} · ${fmtH(tH(s,'a'))} wk</div></div>${adj?'<span class="tadj">adjusted</span>':''}${fi?'<span class="tfi">req.filled</span>':''}${ov?'<span class="tovr">override</span>':''}</div>`;
    }).join('');
    const editRows=ins.map(s=>`<div class="agrow"><span class="agname">${s.name}</span>${cellH(s.id,d,ALLOC[s.id][d],false,true)}</div>`).join('');
    return`<div class="rcard"><div class="rcardh"><div class="sdot" style="background:${sv.dot}"></div><span>${sv.lbl}</span><span class="rtime">${sv.time}</span><span class="rct2">${ins.length} staff</span><button class="btn" style="font-size:10px;height:22px;padding:0 7px;margin-left:4px" onclick="tgAlEdit('${sk}${d}')">Edit ▾</button></div>
      <div>${chips}</div><div class="alloc-grid-wrap" id="agw${sk}${d}">${editRows}</div></div>`;
  }).join('');
  const chk=`<div class="scchk"><div class="sccht">Staffing requirements check</div><div class="sccgrid">${ROLES_DEF.map(r=>{const mn=MINS[r]||0;if(!mn)return'';const hv=STAFF.filter(s=>s.role===r&&(ALLOC[s.id]||[])[d]&&(ALLOC[s.id]||[])[d].type).length;return`<div class="sci ${hv>=mn?'sciok':'scibad'}">${hv>=mn?'✓':'⚠'} ${r}: ${hv}/${mn}</div>`;}).join('')}</div></div>`;
  const off=STAFF.filter(s=>!((ALLOC[s.id]||[])[d]&&(ALLOC[s.id]||[])[d].type));
  const offR=off.length>0?`<div class="offlbl">Day off: ${off.map(s=>s.name).join(', ')}</div>`:'';
  const el=document.getElementById('mgrres');if(el)el.innerHTML=`<div class="dtabs">${tabs}</div>${grps}${chk}${offR}`;
}

function renderLanding(){
  return`<div class="land">
    <div><div class="landt">Staff Shift Scheduler</div><div class="lands">Work week: Thursday – Wednesday</div></div>
    <div class="lcards">
      <div class="lcard" onclick="VIEW='emp';EMP_ID=null;render()"><div class="licon">👤</div><div class="lcardt">Staff member</div><div class="lcardd">Submit your shift preferences for the week</div></div>
      <div class="lcard" onclick="VIEW='auth';render()"><div class="licon">🗂</div><div class="lcardt">Manager access</div><div class="lcardd">View preferences and allocate shifts</div></div>
    </div>
    ${DEADLINE?`<div style="font-size:12px;color:${isPastDL()?'#991b1b':'#92400e'};background:${isPastDL()?'#fee2e2':'#fef3c7'};padding:7px 14px;border-radius:20px">${isPastDL()?'⛔ Submissions closed':'⏱ Preference deadline: '+dlLabel()}</div>`:''}
  </div>`;
}

function renderAuth(){
  return`<div class="authwrap">
    <button class="btn" style="margin-bottom:16px" onclick="VIEW='landing';render()">← Back</button>
    <div class="autht">Manager access</div>
    <div class="auths">Enter your 4-digit PIN to continue<br><span style="font-size:11px;color:var(--color-text-tertiary,#aaa)">Default PIN: 1234</span></div>
    <input type="password" id="pinI" class="pininp" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')chkPin()">
    <div id="pinerr" class="pinerr">Incorrect PIN. Please try again.</div>
    <div style="display:flex;justify-content:center"><button class="btn btn-p" onclick="chkPin()">Enter</button></div>
  </div>`;
}
function chkPin(){const v=document.getElementById('pinI');if(!v)return;if(v.value===PIN){VIEW='mgr';render();}else{const e=document.getElementById('pinerr');if(e)e.style.display='block';}}

function renderEmpList(){
  const th=gws(WK_OFF),e=new Date(th);e.setDate(th.getDate()+6);
  const past=isPastDL();
  return`<div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><button class="btn" onclick="VIEW='landing';render()">← Back</button></div>
    ${dlBannerEmpHTML()}
    <div style="text-align:center;margin-bottom:4px;font-size:16px;font-weight:500">Select your name</div>
    <div style="text-align:center;font-size:12px;color:var(--color-text-secondary,#666);margin-bottom:6px">Week of ${fmtD(th)} – ${fmtD(e)}</div>
    <div style="text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px">
      <button class="btn" onclick="WK_OFF--;render()">‹</button><span class="wklbl">${wkHdr()}</span><button class="btn" onclick="WK_OFF++;render()">›</button>
    </div>
    <div class="nlst">
      ${STAFF.length===0?`<div style="text-align:center;padding:20px;color:var(--color-text-tertiary,#aaa);font-size:13px">No staff added yet.</div>`:
        STAFF.map(s=>`<div class="nitem${s.sub||past?' ndone':''}" onclick="${s.sub||past?'':('EMP_ID='+s.id+';VIEW=\'empform\';render()')}">
          <div><div class="nm">${s.name}</div><div class="nr">${s.role} · ${s.emp==='FT'?'Full-time':'Part-time'}</div></div>
          ${s.sub?`<span class="subok" style="font-size:11px">✓ Submitted</span>`:past?`<span style="font-size:11px;color:#991b1b">Closed</span>`:`<span style="font-size:16px;color:var(--color-text-tertiary,#aaa)">→</span>`}
        </div>`).join('')}
    </div>
  </div>`;
}

function renderEmpForm(){
  const s=STAFF.find(x=>x.id===EMP_ID);
  if(!s)return renderEmpList();
  if(s.sub)return renderEmpDone(s);
  const past=isPastDL();
  if(past){
    return`<div><button class="btn" style="margin-bottom:14px" onclick="EMP_ID=null;VIEW='emp';render()">← Back</button>
      <div class="locked-notice" style="margin-top:12px">⛔ Submissions are closed — the deadline (${dlLabel()}) has passed. Please contact your manager.</div></div>`;
  }
  const tc=todayC(),th=gws(WK_OFF),e=new Date(th);e.setDate(th.getDate()+6);
  const hrs=tH(s,'p');
  return`<div>
    <button class="btn" style="margin-bottom:14px" onclick="EMP_ID=null;VIEW='emp';render()">← Back</button>
    ${dlBannerEmpHTML()}
    ${cuEdHTML()}
    <div class="ephdr">
      <div><div class="epn">${s.name}</div><div class="epr">${s.role} · ${s.emp==='FT'?'Full-time':'Part-time'}</div></div>
      <div class="epright"><div style="display:flex;align-items:center;gap:4px"><button class="btn" onclick="WK_OFF--;render()">‹</button><span class="wklbl">${fmtD(th)} – ${fmtD(e)}</span><button class="btn" onclick="WK_OFF++;render()">›</button></div></div>
    </div>
    <div class="gw" style="margin-bottom:12px">
      <table class="sg" style="min-width:560px">
        <thead><tr>${DAYS.map((dy,i)=>{const dd=new Date(th);dd.setDate(th.getDate()+i);return`<th${i===tc?' class="thtc"':''}>${dy}<br><span style="font-size:9px;font-weight:400;opacity:.7">${dd.getDate()}</span></th>`;}).join('')}<th class="hc">Hrs</th></tr></thead>
        <tbody><tr>${s.prefs.map((p,di)=>`<td${di===tc?' class="tc"':''}>${cellH(s.id,di,p,false,false)}</td>`).join('')}<td class="hc-td ${hrs===0?'hz':''}">${fmtH(hrs)}</td></tr></tbody>
      </table>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;font-size:11px;color:var(--color-text-secondary,#666)">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#EF9F27"></div>Starting — 4:00am–12:30pm (8.5h)</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#378ADD"></div>Closing — 12:30pm–9:30pm (9h)</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#7F77DD"></div>Custom hours</div>
    </div>
    <div class="ep-actions" style="display:flex;justify-content:center"><button class="btn btn-p" onclick="subPref(${s.id})">Submit my preferences</button></div>
  </div>`;
}

function renderEmpDone(s){
  const hrs=tH(s,'p');
  return`<div class="donewrap"><div class="doneicon">✅</div><div class="donet">Preferences submitted!</div>
    <div class="dones">Thanks ${s.name.split(' ')[0]}. Your preferences have been recorded.</div>
    <div class="donem">${fmtH(hrs)} scheduled · ${s.role} · ${s.emp==='FT'?'Full-time':'Part-time'}</div>
    <button class="btn" style="margin-top:6px" onclick="EMP_ID=null;VIEW='emp';render()">← Back to list</button>
    <button class="btn" style="margin-top:4px" onclick="VIEW='landing';EMP_ID=null;render()">Go to home</button>
  </div>`;
}

function renderMgr(){
  const tot=STAFF.length,done=subCt(),pct=tot>0?Math.round(done/tot*100):0;
  const haAlloc=Object.keys(ALLOC).length>0;
  const dlActive=DEADLINE!==null;
  const meta=haAlloc?suggMeta():null;
  return`<div>
    <div class="prog-wrap">
      <div class="prog-row"><span class="prog-txt">${tot===0?'No staff added':done===tot&&tot>0?'All preferences submitted ✓':`${done} of ${tot} staff submitted`}</span>${dlActive?`<span class="${isPastDL()?'dlbdg passed':'dlbdg pending'}">${isPastDL()?'⛔ Submissions closed':'⏱ Deadline: '+dlLabel()}</span>`:''}</div>
      <div class="prog-track"><div class="prog-bar" style="width:${pct}%"></div></div>
    </div>
    <div class="tbar">
      <div class="tl"><button class="btn" onclick="VIEW='landing';render()">← Home</button><div class="wkn"><button onclick="WK_OFF--;render()">‹</button><button onclick="WK_OFF++;render()">›</button></div><span class="wklbl">${wkHdr()}</span></div>
      <div class="tr">
        ${MGR_TAB==='prefs'?`<button class="btn ${SHOW_REQ?'act':''}" id="rqbtn" onclick="tgReq()">⊞ Requirements</button><button class="btn ${SHOW_DL?'act':''}" id="dlbtn" onclick="tgDL()">⏱ Deadline</button><button class="btn btn-p" ${allSub()?'':'disabled'} onclick="calcShow()">Calculate</button>`:
        `<button class="btn" onclick="MGR_TAB='prefs';render()">← Preferences</button>`}
        ${haAlloc?`<button class="btn btn-g" onclick="expXL()">⬇ Excel</button><button class="btn" onclick="cpTxt()">⧉ Copy</button>`:''}
        <button class="btn" onclick="window.print()">⊟ Print</button>
      </div>
    </div>
    <div id="rqwrap" style="display:none"><div class="rpan"><div style="font-size:13px;font-weight:500;margin-bottom:4px">Minimum staff per day</div><div style="font-size:11px;color:var(--color-text-tertiary,#aaa);margin-bottom:12px">Required per role on any given day</div><div class="rgrid" id="rqgrid"></div></div></div>
    <div id="dlwrap" style="display:none"><div class="dlpan">
      <div style="font-size:13px;font-weight:500;margin-bottom:2px">Submission deadline</div>
      <div style="font-size:11px;color:var(--color-text-tertiary,#aaa)">Staff cannot submit or edit preferences after this date and time</div>
      <div class="dlrow">
        <div><div style="font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:4px">Deadline date and time</div><input type="datetime-local" id="dlInp" value="${DEADLINE||''}" class="dlinp" onchange="setDL(this.value)"></div>
        ${DEADLINE?`<button class="btn" onclick="clrDL()">Clear</button><span class="dlbdg ${isPastDL()?'passed':'pending'}">${isPastDL()?'⛔ Closed — no new submissions':'⏱ '+(timeUntilDL()||dlLabel())}</span>`:'<span style="font-size:11px;color:var(--color-text-tertiary,#aaa)">No deadline set</span>'}
      </div>
    </div></div>
    ${MGR_TAB==='prefs'?`${cuEdHTML()}<div id="mgrprefs"></div>`:''}
    ${MGR_TAB==='results'?`
      ${meta?`<div class="sugg-banner">
        <div class="sugg-title">Suggested allocation — ${wkHdr()}</div>
        <div class="sugg-sub">Based on submitted preferences and your staffing requirements. You can override any assignment using the Edit buttons below.</div>
        <div class="sugg-stats">
          <span class="sstat ${meta.fullDays===7?'ok':'wi'}">${meta.fullDays}/7 days fully staffed</span>
          ${meta.adj===0?`<span class="sstat ok">All preferences honored</span>`:`<span class="sstat wi">${meta.adj} preference${meta.adj>1?'s':''} adjusted for coverage</span>`}
          ${meta.filled>0?`<span class="sstat info">${meta.filled} added to meet requirements</span>`:''}
          ${meta.fullDays===7&&meta.adj===0?`<span class="sstat ok">Optimal match</span>`:''}
        </div>
      </div>`:''}
      ${cuEdHTML()}<div id="mgrres"></div>
    `:''}
    <div class="leg"><div class="legi"><div class="legd" style="background:#EF9F27"></div>Starting — 4:00am–12:30pm (8.5h)</div><div class="legi"><div class="legd" style="background:#378ADD"></div>Closing — 12:30pm–9:30pm (9h)</div><div class="legi"><div class="legd" style="background:#7F77DD"></div>Custom</div><div class="legi"><span class="ebdg FT">FT</span>Full-time</div><div class="legi"><span class="ebdg PT">PT</span>Part-time</div></div>
  </div>`;
}

function render(){
  const root=document.getElementById('root');
  if(VIEW==='landing'){root.innerHTML=renderLanding();return;}
  if(VIEW==='auth'){root.innerHTML=renderAuth();return;}
  if(VIEW==='emp'){root.innerHTML=renderEmpList();return;}
  if(VIEW==='empform'){root.innerHTML=renderEmpForm();setTimeout(updCuH,0);return;}
  if(VIEW==='mgr'){
    root.innerHTML=renderMgr();
    if(MGR_TAB==='prefs'){rdPrefs();if(SHOW_REQ)rdReq();}
    else rdRes();
    setTimeout(updCuH,0);
  }
}
render();
</script>
